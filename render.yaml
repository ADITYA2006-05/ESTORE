databases:
  - name: estore-db
    plan: free

services:
  - type: web
    name: estore-web
    runtime: node
    plan: free
    buildCommand: npm clean-install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node prisma/seed.js && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: estore-db
          property: connectionString
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
